<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Tumor AI</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #020617, #000);
    color: white;
    overflow-y: auto;
}

/* LAYOUT */
.layout {
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 300px;
    padding: 30px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: rgba(255,255,255,0.02);
    backdrop-filter: blur(10px);
    border-right: 1px solid rgba(255,255,255,0.05);
}

/* BUTTON */
button {
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #6366f1, #8b5cf6);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #8b5cf6;
}

button:disabled {
    background: #555;
}

/* MAIN */
.main {
    background: radial-gradient(circle at center, rgba(139,92,246,0.08), transparent 70%);
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 60px 0;
    gap: 20px;
    position: relative;
    z-index: 1;
}

.main::before
{
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle at center, rgba(139,92,246,0.15), transparent 70%);
    filter: blue(100px);
    z-index: 0;
}

/* IMAGE */
#preview {
    max-width: 420px;
    border-radius: 20px;
    display: none;
    animation: fadeIn 0.6s ease;
    transition: 0.4s ease;
}

#preview:hover {
    transform: scale(1.03);
    box-shadow: 0 0 30px rgba(139,92,224,0.5);
}

/* RESULT */
.result-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 20px 40px;
    border-radius: 16px;
    text-align: center;
    display: none;
    animation: slideUp 0.5s ease;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.result-title {
    font-size: 1.6rem;
    font-weight: bold;
}

/* BAR */
.bar {
    margin-top: 10px;
    height: 8px;
    width: 200px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
}

.bar-fill {
    height: 100%;
    width: 0%;
    transition: width 1s ease;
}

/* RIGHT PANEL */
.insight-panel {
    width: 300px;
    padding: 30px;
    background: rgba(255,255,255,0.02);
    border-left: 1px solid rgba(255,255,255,0.05);
    display: none;
    flex-direction: column;
    gap: 20px;

    opacity: 0;
    transform: translateX(40px);
    transition: all 0.4s ease;
}

.insight-panel.show {
    opacity: 1;
    transform: translateX(0);
}

/* UPLOAD */
.upload-box {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.file-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.file-btn:hover {
    background: rgba(255,255,255,0.15);
}

#fileName {
    font-size: 0.85rem;
    opacity: 0.7;
}

.loader {
    width: 40px;
    height: 40px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid #8b5cf6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ANIMATIONS */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
    <div>
        <h1>🧠 Brain Tumor AI</h1>
        <p style="opacity:0.6;">AI-powered MRI analysis</p>

        <div class="upload-box">
            <input type="file" id="fileInput" style="display:none">
            <button class="file-btn" onclick="document.getElementById('fileInput').click()">📂 Choose MRI</button>
            <span id="fileName">No file selected</span>
        </div>

        <button id="predictBtn" disabled>Analyze MRI</button>
    </div>

    <div style="font-size:0.75rem; opacity:0.4;">
        Vision Transformer • Medical AI
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <img id="preview" src="">
    <div class="result-card" id="result"></div>
</div>

<!-- RIGHT PANEL -->
<div class="insight-panel" id="insightPanel">
    <h3>🧠 AI Analysis</h3>

    <div>Prediction: <b id="insightClass"></b></div>
    <div>Confidence: <b id="insightConfidence"></b></div>
    <div>Risk Level: <b id="insightRisk"></b></div>

    <div id="insightDesc" style="opacity:0.7;"></div>
</div>

</div>

<!-- ✅ CONNECT YOUR JS FILE -->
<script src="src/main.js"></script>

</body>
</html>
